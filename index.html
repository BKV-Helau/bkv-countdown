<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BKV Countdown</title>

<style>
body{
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#ffffff;
font-family:Arial;
}

.container{
position:relative;
}

img{
width:800px;
height:auto;
display:block;
}

#countdown{
position:absolute;
top:43%;
left:50%;
transform:translate(-50%,-50%);
font-size:48px;
font-weight:bold;
color:#1b3f8b;
}
</style>
</head>

<body>

<div class="container">
<img src="fossi.png">
<div id="countdown">...</div>
</div>

<script>

function updateCountdown(){

const eventDate = new Date("Nov 11, 2026 11:11:00").getTime();
const now = new Date().getTime();

const diff = eventDate - now;

const days = Math.floor(diff / (1000*60*60*24));

document.getElementById("countdown").innerHTML = days;

}

updateCountdown();
setInterval(updateCountdown,60000);

</script>

</body>
</html>

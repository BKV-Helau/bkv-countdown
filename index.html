<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BKV Countdown</title>

<style>

body{
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:white;
font-family:Arial;
}

.container{
position:relative;
width:100%;
max-width:900px;
margin:auto;
}

img{
width:100%;
max-width:900px;
height:auto;
display:block;
}

#countdown{
position:absolute;
top:50%;
left:52%;
transform:translate(-50%,-50%);
text-align:center;
width:60%;
}

#days{
font-size:7vw;
font-weight:900;
color:#002f87;
text-shadow:
2px 2px 0 #ffd200,
4px 4px 6px rgba(0,0,0,0.3);
}

#text{
font-size:4vw;
font-weight:700;
color:#002f87;
line-height:1.2;
Text-shadow: 1px 1px 2px
rgba(255,255,255,0.8);
}

#extra{
margin-top:10px;
font-size:20px;
color:#002f87;
font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<img src="fossi.png">

<div id="countdown">

<div id="text">
Noch <span id="days"></span> Tage<br>
bis zum Sessionstart!
</div>

<div id="extra"></div>

</div>

</div>

<script>

function updateCountdown(){

const eventDate = new Date("Nov 11, 2026 11:11:00").getTime();
const now = new Date().getTime();

const diff = eventDate - now;

const days = Math.floor(diff / (1000*60*60*24));
const hours = Math.floor((diff % (1000*60*60*24)) / (1000*60*60));
const minutes = Math.floor((diff % (1000*60*60)) / (1000*60));
const seconds = Math.floor((diff % (1000*60)) / 1000);

if(days > 0){

document.getElementById("days").innerHTML = days;

}else{

document.getElementById("days").innerHTML =
hours + ":" + minutes.toString().padStart(2,"0") + ":" + seconds.toString().padStart(2,"0");

document.getElementById("text").innerHTML =
"Stunden bis zum<br>Sessionstart!";

}

if(days < 10){
document.getElementById("extra").innerHTML = "🥳 Bald geht’s los!";
}

if(days < 100){
document.body.style.background = "#fff8e6";
}

}

updateCountdown();
setInterval(updateCountdown,1000);

</script>

</body>
</html>

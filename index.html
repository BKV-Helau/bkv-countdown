<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BKV Countdown</title>
<meta name="viewport"
content="width=device-width,
initial-scale=1.0">

<style>

body{
margin:0;
background:white;
font-family:Arial;
}

.container{
position:relative;
width:100%;
max-width:900px;
margin:40px auto;
}

img{
width:100%;
height:auto;
display:block;
}

#countdown{
position:absolute;
top:47%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
}

#days{
font-size: clamp(40px, 8vw, 90px);
font-weight: bold;
color:#002f87;
text-shadow:
  1px 1px 0 #ffd200,
  2px 2px 4px rgba(0,0,0,0.4);
}

#text{
font-size: clamp(16px, 3vw, 28px);
font-weight:700;
color:#002f87;
line-height:1.2;
Text-shadow: 
  1px 1px 0 #ffffff,
  2px 2px 4px rgba(0,0,0,0.3);
}

#extra{
margin-top:10px;
font-size:20px;
color:#002f87;
font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<img src="fossi.png">

<div id="countdown">

<div id="text">
Noch <span id="days"></span> Tage<br>
bis zum Sessionstart!
</div>

<div id="extra"></div>

</div>

</div>

<script>

function updateCountdown(){

const eventDate = new Date("Nov 11, 2026 11:11:00").getTime();
const now = new Date().getTime();

const diff = eventDate - now;

const days = Math.floor(diff / (1000*60*60*24));
const hours = Math.floor((diff % (1000*60*60*24)) / (1000*60*60));
const minutes = Math.floor((diff % (1000*60*60)) / (1000*60));
const seconds = Math.floor((diff % (1000*60)) / 1000);

if(days > 0){

document.getElementById("days").innerHTML = days;

}else{

document.getElementById("days").innerHTML =
hours + ":" + minutes.toString().padStart(2,"0") + ":" + seconds.toString().padStart(2,"0");

document.getElementById("text").innerHTML =
"Stunden bis zum<br>Sessionstart!";

}

if(days < 10){
document.getElementById("extra").innerHTML = "🥳 Bald geht’s los!";
}

if(days < 100){
document.body.style.background = "#fff8e6";
}

}

updateCountdown();
setInterval(updateCountdown,1000);

</script>

</body>
</html>

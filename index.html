<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body{
margin:0;
background:transparent;
text-align:center;
font-family:Arial;
}

canvas{
max-width:100%;
height:auto;
}
</style>
</head>

<body>

<canvas id="canvas" width="800" height="600"></canvas>

<script>

const target = new Date("2026-11-11T11:11:00");
const now = new Date();

const diff = target - now;
const days = Math.floor(diff / (1000*60*60*24));

let line1 = "Noch " + days + " Tage";
let line2 = "bis zum Sessionstart!";

if(days <= 100){
line2 = "🎉 Der Countdown läuft!";
}

if(days <= 50){
line2 = "🥁 Der BKV rückt näher!";
}

if(days <= 10){
line2 = "🎭 Bald geht's los!";
}

if(days <= 0){
line1 = "👑 HEUTE";
line2 = "SESSIONSTART – BKV HELAU!";
}

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const img = new Image();
img.src = "fossi.png";

img.onload = function(){

ctx.drawImage(img,0,0,800,600);

ctx.font="bold 46px Arial";
ctx.fillStyle="#003399";
ctx.textAlign="center";

ctx.fillText(line1,400,330);
ctx.fillText(line2,400,380);

}

</script>

</body>
</html>

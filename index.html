<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BKV Countdown</title>

<style>

body{
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:white;
font-family:Arial;
}

.container{
position:relative;
}

img{
width:850px;
height:auto;
display:block;
}

#countdown{
position:absolute;
top:46%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
color:#1b3f8b;
}

#days{
font-size:72px;
font-weight:bold;
display:block;
}

#text{
font-size:28px;
font-weight:bold;
}

#extra{
margin-top:10px;
font-size:20px;
color:#e39b00;
font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<img src="fossi.png">

<div id="countdown">

<span id="days"></span>

<div id="text">
Noch Tage<br>
bis zum Sessionstart!
</div>

<div id="extra"></div>

</div>

</div>

<script>

function updateCountdown(){

const eventDate = new Date("Nov 11, 2026 11:11:00").getTime();
const now = new Date().getTime();

const diff = eventDate - now;

const days = Math.floor(diff / (1000*60*60*24));

document.getElementById("days").innerHTML = days;

if(days < 10){
document.getElementById("extra").innerHTML = "🥳 Bald geht’s los!";
}

if(days < 100){
document.body.style.background = "#fff8e6";
}

}

updateCountdown();
setInterval(updateCountdown,60000);

</script>

</body>
</html>
